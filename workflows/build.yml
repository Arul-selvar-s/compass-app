name: 🧭 Build Compass APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:          # lets you trigger manually from the GitHub website

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      # 1 ── Download the code
      - name: Checkout
        uses: actions/checkout@v4

      # 2 ── Set up Java 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3 ── Set up Gradle (downloads wrapper automatically – no JAR needed)
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: wrapper

      # 4 ── Make gradlew executable
      - name: Grant execute permission
        run: chmod +x gradlew

      # 5 ── Build the APK
      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon

      # 6 ── Upload the APK so you can download it
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Compass-App-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 90      # available to download for 90 days
