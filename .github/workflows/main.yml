          cat > app/src/main/java/com/compass/diary/ui/screens/editor/DailyPageScreen.kt << 'EOF'
          package com.compass.diary.ui.screens.editor

          import androidx.compose.foundation.*
          import androidx.compose.foundation.layout.*
          import androidx.compose.foundation.shape.RoundedCornerShape
          import androidx.compose.foundation.text.BasicTextField
          import androidx.compose.material.icons.Icons
          import androidx.compose.material.icons.automirrored.filled.ArrowBack
          import androidx.compose.material.icons.filled.*
          import androidx.compose.material3.*
          import androidx.compose.runtime.*
          import androidx.compose.ui.Alignment
          import androidx.compose.ui.Modifier
          import androidx.compose.ui.graphics.Color
          import androidx.compose.ui.graphics.SolidColor
          import androidx.compose.ui.text.*
          import androidx.compose.ui.text.font.FontStyle
          import androidx.compose.ui.text.font.FontWeight
          import androidx.compose.ui.text.input.TextFieldValue
          import androidx.compose.ui.text.style.TextDecoration
          import androidx.compose.ui.unit.dp
          import androidx.compose.ui.unit.sp
          import androidx.hilt.navigation.compose.hiltViewModel
          import com.compass.diary.ui.components.DrawingCanvas
          import com.compass.diary.ui.theme.CompassColors
          import com.compass.diary.util.SaveState
          import com.compass.diary.viewmodel.DiaryViewModel

          // Separators stored in contentJson to split locked vs draft
          private const val SEP_LOCK  = "\u00A7L\u00A7"
          private const val SEP_DRAFT = "\u00A7D\u00A7"

          private fun pack(locked: String, draft: String) = "$SEP_LOCK$locked$SEP_DRAFT$draft"
          private fun unpack(raw: String): Pair<String, String> {
              if (!raw.contains(SEP_LOCK)) return "" to raw
              val locked = raw.substringAfter(SEP_LOCK).substringBefore(SEP_DRAFT)
              val draft  = raw.substringAfter(SEP_DRAFT, "")
              return locked to draft
          }

          // Apply a SpanStyle to the current text selection
          private fun TextFieldValue.styled(style: SpanStyle): TextFieldValue {
              val sel = selection
              if (sel.collapsed) return this
              val built = buildAnnotatedString {
                  append(annotatedString.text)
                  annotatedString.spanStyles.forEach { addStyle(it.item, it.start, it.end) }
                  addStyle(style, sel.min, sel.max)
              }
              return TextFieldValue(annotatedString = built, selection = selection)
          }

          private fun TextFieldValue.insert(s: String): TextFieldValue {
              val pos = selection.end
              val newText = text.substring(0, pos) + s + text.substring(pos)
              return TextFieldValue(newText, TextRange(pos + s.length))
          }

          @OptIn(ExperimentalMaterial3Api::class)
          @Composable
          fun DailyPageScreen(
              dateKey: String,
              onBack: () -> Unit,
              onOpenAI: () -> Unit,
              viewModel: DiaryViewModel = hiltViewModel()
          ) {
              val entry     by viewModel.currentEntry.collectAsState()
              val saveState by viewModel.saveState.collectAsState()

              var lockedText  by remember { mutableStateOf("") }
              var draft       by remember { mutableStateOf(TextFieldValue()) }
              var showDrawing by remember { mutableStateOf(false) }
              var showConfirm by remember { mutableStateOf(false) }

              LaunchedEffect(dateKey) { viewModel.selectEntry(dateKey) }

              LaunchedEffect(entry?.contentJson) {
                  entry?.contentJson?.let { raw ->
                      val (locked, draftStr) = unpack(raw)
                      lockedText = locked
                      if (draft.text.isEmpty() && draftStr.isNotEmpty())
                          draft = TextFieldValue(draftStr)
                  }
              }

              LaunchedEffect(draft.text) {
                  viewModel.onContentChanged(dateKey, pack(lockedText, draft.text))
              }

              if (showDrawing) {
                  DrawingCanvas(
                      onSave  = { paths -> viewModel.saveDrawing(dateKey, paths); showDrawing = false },
                      onClose = { showDrawing = false }
                  )
                  return
              }

              Scaffold(
                  topBar = {
                      TopAppBar(
                          navigationIcon = {
                              IconButton(onClick = {
                                  viewModel.forceSave(dateKey, pack(lockedText, draft.text))
                                  onBack()
                              }) { Icon(Icons.AutoMirrored.Filled.ArrowBack, "Back") }
                          },
                          title = {
                              Column {
                                  Text(entry?.title ?: dateKey,
                                      style = MaterialTheme.typography.titleMedium,
                                      fontWeight = FontWeight.SemiBold)
                                  Text(
                                      when (saveState) {
                                          SaveState.SAVING -> "Saving…"
                                          SaveState.SAVED  -> "Saved ✓"
                                          SaveState.ERROR  -> "Error"
                                          else             -> "${entry?.wordCount ?: 0} words"
                                      },
                                      style = MaterialTheme.typography.labelSmall,
                                      color = when (saveState) {
                                          SaveState.SAVED -> CompassColors.Success
                                          SaveState.ERROR -> CompassColors.Error
                                          else -> MaterialTheme.colorScheme.onSurfaceVariant
                                      }
                                  )
                              }
                          },
                          actions = {
                              if (draft.text.isNotBlank()) {
                                  IconButton(onClick = { showConfirm = true }) {
                                      Icon(Icons.Default.Save, "Save & Lock", tint = CompassColors.Gold400)
                                  }
                              }
                              IconButton(onClick = onOpenAI) {
                                  Icon(Icons.Default.AutoAwesome, "AI")
                              }
                          }
                      )
                  }
              ) { padding ->
                  Column(modifier = Modifier.fillMaxSize().padding(padding)) {

                      // ── FORMAT TOOLBAR ────────────────────────────────
                      Row(
                          modifier = Modifier
                              .fillMaxWidth()
                              .horizontalScroll(rememberScrollState())
                              .background(MaterialTheme.colorScheme.surface)
                              .padding(horizontal = 6.dp, vertical = 4.dp),
                          horizontalArrangement = Arrangement.spacedBy(2.dp),
                          verticalAlignment = Alignment.CenterVertically
                      ) {
                          FmtBtn("B", weight = FontWeight.Bold)   { draft = draft.styled(SpanStyle(fontWeight = FontWeight.Bold)) }
                          FmtBtn("I", style = FontStyle.Italic)   { draft = draft.styled(SpanStyle(fontStyle = FontStyle.Italic)) }
                          FmtBtn("U", deco = TextDecoration.Underline) { draft = draft.styled(SpanStyle(textDecoration = TextDecoration.Underline)) }
                          FmtBtn("S̶", deco = TextDecoration.LineThrough) { draft = draft.styled(SpanStyle(textDecoration = TextDecoration.LineThrough)) }
                          VerticalDivider(modifier = Modifier.height(28.dp).padding(horizontal = 4.dp))
                          SmallIconBtn(Icons.Default.List, "Bullet")     { draft = draft.insert("\n• ") }
                          SmallIconBtn(Icons.Default.FormatListNumbered, "Numbered") {
                              draft = draft.insert("\n${draft.text.count { it == '\n' } + 1}. ")
                          }
                          SmallIconBtn(Icons.Default.CheckBox, "Checklist") { draft = draft.insert("\n☐ ") }
                          VerticalDivider(modifier = Modifier.height(28.dp).padding(horizontal = 4.dp))
                          SmallIconBtn(Icons.Default.Draw, "Draw") { showDrawing = true }
                          SmallIconBtn(Icons.Default.Star, "Star") {
                              val sel = draft.selection
                              if (!sel.collapsed) {
                                  val selected = draft.text.substring(sel.start, sel.end)
                                  viewModel.starContent(dateKey, selected)
                              }
                          }
                      }
                      HorizontalDivider()

                      // ── EDITOR AREA ───────────────────────────────────
                      Column(
                          modifier = Modifier
                              .fillMaxSize()
                              .verticalScroll(rememberScrollState())
                              .padding(horizontal = 20.dp, vertical = 16.dp)
                              .imePadding()
                      ) {
                          // Locked content (read-only)
                          if (lockedText.isNotBlank()) {
                              Surface(
                                  color = MaterialTheme.colorScheme.surfaceVariant.copy(alpha = 0.5f),
                                  shape = RoundedCornerShape(8.dp),
                                  modifier = Modifier.fillMaxWidth()
                              ) {
                                  Column(modifier = Modifier.padding(14.dp)) {
                                      Row(verticalAlignment = Alignment.CenterVertically) {
                                          Icon(Icons.Default.Lock, null, modifier = Modifier.size(13.dp), tint = CompassColors.Success)
                                          Spacer(Modifier.width(4.dp))
                                          Text("Saved — read only",
                                              style = MaterialTheme.typography.labelSmall,
                                              color = CompassColors.Success)
                                      }
                                      Spacer(Modifier.height(8.dp))
                                      Text(lockedText,
                                          style = MaterialTheme.typography.bodyLarge,
                                          color = MaterialTheme.colorScheme.onSurface.copy(alpha = 0.75f))
                                  }
                              }
                              HorizontalDivider(modifier = Modifier.padding(vertical = 16.dp))
                              Text("Add more below ↓",
                                  style = MaterialTheme.typography.labelSmall,
                                  color = MaterialTheme.colorScheme.onSurfaceVariant,
                                  modifier = Modifier.align(Alignment.CenterHorizontally))
                              Spacer(Modifier.height(12.dp))
                          }

                          // Editable draft area
                          BasicTextField(
                              value = draft,
                              onValueChange = { draft = it },
                              modifier = Modifier
                                  .fillMaxWidth()
                                  .defaultMinSize(minHeight = 220.dp),
                              textStyle = MaterialTheme.typography.bodyLarge.copy(
                                  color     = MaterialTheme.colorScheme.onBackground,
                                  lineHeight = 26.sp
                              ),
                              cursorBrush = SolidColor(CompassColors.Blue400),
                              decorationBox = { inner ->
                                  if (draft.text.isEmpty()) {
                                      Text(
                                          if (lockedText.isBlank()) "Write anything…"
                                          else "Continue your entry…",
                                          style = MaterialTheme.typography.bodyLarge.copy(
                                              color = MaterialTheme.colorScheme.onSurfaceVariant.copy(alpha = 0.4f))
                                      )
                                  }
                                  inner()
                              }
                          )
                      }
                  }
              }

              // Save & Lock confirmation
              if (showConfirm) {
                  AlertDialog(
                      onDismissRequest = { showConfirm = false },
                      icon  = { Icon(Icons.Default.Lock, null, tint = CompassColors.Gold400) },
                      title = { Text("Save and lock?") },
                      text  = {
                          Text("Your current writing will be permanently saved. " +
                               "You can still add more below it, but saved content cannot be edited or deleted.")
                      },
                      confirmButton = {
                          Button(
                              onClick = {
                                  val combined = if (lockedText.isBlank()) draft.text
                                                 else "$lockedText\n\n${draft.text}"
                                  lockedText  = combined
                                  draft       = TextFieldValue()
                                  viewModel.onContentChanged(dateKey, pack(combined, ""))
                                  showConfirm = false
                              },
                              colors = ButtonDefaults.buttonColors(containerColor = CompassColors.Gold400)
                          ) { Text("Save & Lock") }
                      },
                      dismissButton = {
                          TextButton(onClick = { showConfirm = false }) { Text("Not yet") }
                      }
                  )
              }
          }

          @Composable
          private fun FmtBtn(
              label: String,
              weight: FontWeight    = FontWeight.Normal,
              style: FontStyle      = FontStyle.Normal,
              deco: TextDecoration? = null,
              onClick: () -> Unit
          ) {
              Surface(
                  onClick = onClick,
                  shape   = RoundedCornerShape(6.dp),
                  color   = Color.Transparent,
                  modifier = Modifier.size(36.dp)
              ) {
                  Box(contentAlignment = Alignment.Center) {
                      Text(label,
                          fontWeight = weight,
                          fontStyle  = style,
                          style      = MaterialTheme.typography.labelLarge.copy(textDecoration = deco),
                          color      = MaterialTheme.colorScheme.onSurface)
                  }
              }
          }

          @Composable
          private fun SmallIconBtn(
              icon: androidx.compose.ui.graphics.vector.ImageVector,
              desc: String,
              onClick: () -> Unit
          ) {
              IconButton(onClick = onClick, modifier = Modifier.size(36.dp)) {
                  Icon(icon, desc, modifier = Modifier.size(18.dp))
              }
          }
