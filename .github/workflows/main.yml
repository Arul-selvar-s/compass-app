name: Build Compass APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Apply all fixes
        run: |

          # 1. Fix launcher icon
          cat > app/src/main/res/drawable/ic_launcher_foreground.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="108dp" android:height="108dp"
              android:viewportWidth="108" android:viewportHeight="108">
              <path android:fillColor="#2563C8" android:pathData="M54,10 A44,44 0 1,0 54,98 A44,44 0 1,0 54,10 Z"/>
              <path android:fillColor="#FFFFFF" android:pathData="M54,22 L50,54 L54,52 L58,54 Z"/>
              <path android:fillColor="#EF4444" android:pathData="M54,86 L50,54 L54,56 L58,54 Z"/>
              <path android:fillColor="#FFFFFF" android:pathData="M50,50 A4,4 0 1,0 58,50 A4,4 0 1,0 50,50 Z"/>
          </vector>
          EOF

          # 2. Fix themes.xml
          cat > app/src/main/res/values/themes.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="Theme.Compass" parent="android:Theme.Material.Light.NoActionBar">
                  <item name="android:windowBackground">@android:color/black</item>
              </style>
          </resources>
          EOF

          # 3. Remove installSplashScreen
          sed -i 's/installSplashScreen()/\/\/ installSplashScreen()/' \
            app/src/main/java/com/compass/diary/MainActivity.kt

          # 4. Disable SQLCipher
          sed -i 's/SQLiteDatabase.loadLibs(this)/\/\/ SQLiteDatabase.loadLibs(this)/' \
            app/src/main/java/com/compass/diary/CompassApplication.kt

          # 5. Fix AppDatabase (no SQLCipher)
          cat > app/src/main/java/com/compass/diary/data/local/database/AppDatabase.kt << 'EOF'
          package com.compass.diary.data.local.database
          import androidx.room.Database
          import androidx.room.Room
          import androidx.room.RoomDatabase
          import android.content.Context
          import com.compass.diary.data.local.dao.*
          import com.compass.diary.data.local.entity.*
          @Database(entities=[DiaryEntryEntity::class,StarredItemEntity::class,ReminderEntity::class,VersionHistoryEntity::class,SharedPageEntity::class,DrawingEntity::class,VoiceNoteEntity::class],version=1,exportSchema=false)
          abstract class AppDatabase : RoomDatabase() {
              abstract fun diaryDao(): DiaryDao
              abstract fun starredDao(): StarredDao
              abstract fun reminderDao(): ReminderDao
              abstract fun versionHistoryDao(): VersionHistoryDao
              abstract fun drawingDao(): DrawingDao
              abstract fun voiceNoteDao(): VoiceNoteDao
              companion object {
                  fun create(context: Context, passphrase: ByteArray): AppDatabase {
                      return Room.databaseBuilder(context.applicationContext,AppDatabase::class.java,"compass_diary.db").fallbackToDestructiveMigration().build()
                  }
              }
          }
          EOF

          # 6. Fix Entities
          python3 - << 'PYEOF'
          import re
          path = "app/src/main/java/com/compass/diary/data/local/entity/Entities.kt"
          with open(path) as f:
              content = f.read()
          content = re.sub(r'[^\n]*thumbnail[^\n]*\n', '', content)
          with open(path, 'w') as f:
              f.write(content)
          print("Entities fixed")
          PYEOF

          # 7. ViewModels.kt (with saveAngle1 fix)
          cat > app/src/main/java/com/compass/diary/viewmodel/ViewModels.kt << 'EOF'
          package com.compass.diary.viewmodel

          import android.content.Context
          import androidx.biometric.BiometricManager
          import androidx.lifecycle.ViewModel
          import androidx.lifecycle.viewModelScope
          import com.compass.diary.data.repository.DiaryRepository
          import com.compass.diary.util.CompassSensorManager
          import com.compass.diary.util.PreferencesManager
          import dagger.hilt.android.lifecycle.HiltViewModel
          import dagger.hilt.android.qualifiers.ApplicationContext
          import kotlinx.coroutines.flow.*
          import kotlinx.coroutines.launch
          import java.text.SimpleDateFormat
          import java.util.*
          import javax.inject.Inject

          @HiltViewModel
          class SetupViewModel @Inject constructor(
              private val sensorManager: CompassSensorManager,
              private val prefs: PreferencesManager,
              @ApplicationContext private val context: Context
          ) : ViewModel() {
              private val _step = MutableStateFlow(0)
              val step: StateFlow<Int> = _step
              val heading: StateFlow<Float> = sensorManager.headingFlow()
                  .stateIn(viewModelScope, SharingStarted.WhileSubscribed(5000), 0f)
              private val _savedAngle1 = MutableStateFlow<Float?>(null)
              val savedAngle1: StateFlow<Float?> = _savedAngle1
              val isBiometricAvailable: StateFlow<Boolean> = MutableStateFlow(
                  BiometricManager.from(context).canAuthenticate(BiometricManager.Authenticators.BIOMETRIC_WEAK) == BiometricManager.BIOMETRIC_SUCCESS
              )
              fun goToStep(s: Int) { _step.value = s }
              fun saveAngle1(angle: Float) {
                  _savedAngle1.value = angle
                  viewModelScope.launch { prefs.setUnlockAngles(angle, angle) }
                  _step.value = 2
              }
              fun setBiometric(v: Boolean) { viewModelScope.launch { prefs.setBiometricEnabled(v) } }
              fun finishSecurity() { _step.value = 4 }
              fun completeSetup() {
                  viewModelScope.launch { prefs.setSetupComplete(true); prefs.setFirstLaunch(false) }
              }
          }

          @HiltViewModel
          class SplashViewModel @Inject constructor(private val prefs: PreferencesManager) : ViewModel() {
              val isSetupComplete: StateFlow<Boolean> = prefs.isSetupComplete
                  .stateIn(viewModelScope, SharingStarted.WhileSubscribed(5000), false)
          }

          @HiltViewModel
          class SettingsViewModel @Inject constructor(
              private val prefs: PreferencesManager,
              private val repo: DiaryRepository
          ) : ViewModel() {
              val darkMode: StateFlow<String> = prefs.darkMode.stateIn(viewModelScope, SharingStarted.WhileSubscribed(5000), "SYSTEM")
              val notificationsEnabled: StateFlow<Boolean> = prefs.isNotificationsEnabled.stateIn(viewModelScope, SharingStarted.WhileSubscribed(5000), false)
              val autoSync: StateFlow<Boolean> = prefs.isAutoSyncEnabled.stateIn(viewModelScope, SharingStarted.WhileSubscribed(5000), true)
              val googleAccount: StateFlow<String?> = prefs.googleAccount.stateIn(viewModelScope, SharingStarted.WhileSubscribed(5000), null)
              val biometricEnabled: StateFlow<Boolean> = prefs.isBiometricEnabled.stateIn(viewModelScope, SharingStarted.WhileSubscribed(5000), false)
              val anthropicApiKey: StateFlow<String?> = prefs.anthropicApiKey.stateIn(viewModelScope, SharingStarted.WhileSubscribed(5000), null)
              private val _lastSyncLabel = MutableStateFlow("Never")
              val lastSyncLabel: StateFlow<String> = _lastSyncLabel
              fun setDarkMode(m: String) { viewModelScope.launch { prefs.setDarkMode(m) } }
              fun setNotifications(v: Boolean) { viewModelScope.launch { prefs.setNotificationsEnabled(v) } }
              fun setAutoSync(v: Boolean) { viewModelScope.launch { prefs.setAutoSync(v) } }
              fun setBiometric(v: Boolean) { viewModelScope.launch { prefs.setBiometricEnabled(v) } }
              fun setApiKey(k: String) { viewModelScope.launch { prefs.setAnthropicApiKey(k) } }
              fun syncNow() { viewModelScope.launch { prefs.setLastSync(System.currentTimeMillis()); _lastSyncLabel.value = SimpleDateFormat("HH:mm", Locale.getDefault()).format(Date()) } }
              fun exportDiary() {}
              fun logout() { viewModelScope.launch { prefs.setGoogleAccount(null); prefs.setSetupComplete(false) } }
          }
          EOF

          # 8. CompassViewModel
          cat > app/src/main/java/com/compass/diary/viewmodel/CompassViewModel.kt << 'EOF'
          package com.compass.diary.viewmodel
          import androidx.lifecycle.ViewModel
          import androidx.lifecycle.viewModelScope
          import com.compass.diary.util.CompassSensorManager
          import com.compass.diary.util.PreferencesManager
          import dagger.hilt.android.lifecycle.HiltViewModel
          import kotlinx.coroutines.flow.*
          import kotlinx.coroutines.launch
          import javax.inject.Inject
          import kotlin.math.abs
          @HiltViewModel
          class CompassViewModel @Inject constructor(
              private val sensorManager: CompassSensorManager,
              private val prefs: PreferencesManager
          ) : ViewModel() {
              data class UnlockAction(val targetAngle: Float, val isCorrect: Boolean)
              val heading: StateFlow<Float> = sensorManager.headingFlow()
                  .stateIn(viewModelScope, SharingStarted.WhileSubscribed(5000), 0f)
              private val _unlockAction = MutableStateFlow<UnlockAction?>(null)
              val unlockAction: StateFlow<UnlockAction?> = _unlockAction
              private var savedAngle = -1f
              init { viewModelScope.launch { prefs.unlockAngles.collect { if (it != null) savedAngle = it.first } } }
              fun tryUnlock(entered: Float) {
                  val diff = if (savedAngle < 0f) 999f else abs(((entered - savedAngle + 540f) % 360f) - 180f)
                  _unlockAction.value = UnlockAction(entered, diff <= 20f)
              }
              fun resetAction() { _unlockAction.value = null }
          }
          EOF

          # 9. CompassScreen
          cat > app/src/main/java/com/compass/diary/ui/screens/compass/CompassScreen.kt << 'EOF'
          package com.compass.diary.ui.screens.compass
          import androidx.compose.animation.core.*
          import androidx.compose.foundation.Canvas
          import androidx.compose.foundation.background
          import androidx.compose.foundation.layout.*
          import androidx.compose.foundation.text.KeyboardOptions
          import androidx.compose.material3.*
          import androidx.compose.runtime.*
          import androidx.compose.ui.Alignment
          import androidx.compose.ui.Modifier
          import androidx.compose.ui.geometry.Offset
          import androidx.compose.ui.graphics.*
          import androidx.compose.ui.graphics.drawscope.Stroke
          import androidx.compose.ui.graphics.drawscope.rotate
          import androidx.compose.ui.text.font.FontWeight
          import androidx.compose.ui.text.input.KeyboardType
          import androidx.compose.ui.unit.dp
          import androidx.compose.ui.unit.sp
          import androidx.hilt.navigation.compose.hiltViewModel
          import com.compass.diary.ui.theme.CompassColors
          import com.compass.diary.viewmodel.CompassViewModel
          import kotlinx.coroutines.delay
          import kotlin.math.sin
          import kotlin.math.cos
          @OptIn(ExperimentalMaterial3Api::class)
          @Composable
          fun CompassScreen(onUnlocked: () -> Unit, viewModel: CompassViewModel = hiltViewModel()) {
              val heading by viewModel.heading.collectAsState()
              val unlockAction by viewModel.unlockAction.collectAsState()
              var showInput by remember { mutableStateOf(false) }
              var angleInput by remember { mutableStateOf("") }
              var isAnimating by remember { mutableStateOf(false) }
              val needleAnim = remember { Animatable(0f) }
              val displayAngle = if (isAnimating) needleAnim.value else -heading
              LaunchedEffect(unlockAction) {
                  val action = unlockAction ?: return@LaunchedEffect
                  isAnimating = true
                  needleAnim.snapTo(-heading)
                  needleAnim.animateTo(needleAnim.value - 360f, animationSpec = tween(900, easing = LinearEasing))
                  val target = -action.targetAngle
                  val current = needleAnim.value % 360f
                  val diff = ((target - current + 540f) % 360f) - 180f
                  needleAnim.animateTo(needleAnim.value + diff, animationSpec = spring(Spring.DampingRatioMediumBouncy, Spring.StiffnessMedium))
                  delay(2000)
                  isAnimating = false
                  if (action.isCorrect) onUnlocked() else viewModel.resetAction()
              }
              Box(modifier = Modifier.fillMaxSize().background(Brush.radialGradient(listOf(Color(0xFF0D1B3E), Color(0xFF060C1A)), radius = 1200f)), contentAlignment = Alignment.Center) {
                  Column(horizontalAlignment = Alignment.CenterHorizontally, verticalArrangement = Arrangement.Center) {
                      Spacer(Modifier.weight(1f))
                      Text("COMPASS", style = MaterialTheme.typography.labelSmall, color = CompassColors.Silver400.copy(0.4f), letterSpacing = 6.sp)
                      Spacer(Modifier.height(32.dp))
                      Canvas(modifier = Modifier.size(280.dp)) {
                          val c = Offset(size.width/2, size.height/2); val r = size.width/2
                          drawCircle(Color(0xFF1E3A6E), radius=r, style=Stroke(3.dp.toPx()))
                          drawCircle(Color(0xFF0D2047), radius=r-4.dp.toPx())
                          drawCircle(Color(0xFF1A3060).copy(0.4f), radius=r*0.85f, style=Stroke(1.dp.toPx()))
                          for (a in 0 until 360 step 10) {
                              val major = a%30==0; val tl = if(major) r*0.09f else r*0.05f
                              val rad = Math.toRadians(a.toDouble())
                              drawLine(if(major) Color(0xFF4B82D0) else Color(0xFF2A4B7A), Offset(c.x+(r*0.88f)*sin(rad).toFloat(),c.y-(r*0.88f)*cos(rad).toFloat()), Offset(c.x+(r*0.88f-tl)*sin(rad).toFloat(),c.y-(r*0.88f-tl)*cos(rad).toFloat()), if(major) 2.dp.toPx() else 1.dp.toPx())
                          }
                          rotate(displayAngle, pivot=c) {
                              drawPath(Path().apply{moveTo(c.x,c.y+7.dp.toPx());lineTo(c.x-7.dp.toPx(),c.y);lineTo(c.x,c.y-r*0.72f);lineTo(c.x+7.dp.toPx(),c.y);close()}, Color(0xFFEF4444))
                              drawPath(Path().apply{moveTo(c.x,c.y-7.dp.toPx());lineTo(c.x-7.dp.toPx(),c.y);lineTo(c.x,c.y+r*0.55f);lineTo(c.x+7.dp.toPx(),c.y);close()}, Color(0xFFE5E7EB))
                          }
                          drawCircle(Color(0xFF2563C8), radius=10.dp.toPx(), center=c)
                          drawCircle(Color(0xFF93C5FD), radius=5.dp.toPx(), center=c)
                      }
                      Spacer(Modifier.height(36.dp))
                      Surface(onClick={if(!isAnimating) showInput=true}, color=Color(0xFF1A2E5A), shape=MaterialTheme.shapes.large, modifier=Modifier.defaultMinSize(minWidth=180.dp)) {
                          Column(modifier=Modifier.padding(horizontal=28.dp,vertical=16.dp), horizontalAlignment=Alignment.CenterHorizontally) {
                              Text("${heading.toInt()}°", style=MaterialTheme.typography.displaySmall, fontWeight=FontWeight.Bold, color=CompassColors.Blue300)
                              Text(cardinal(heading), style=MaterialTheme.typography.titleMedium, color=CompassColors.Silver400)
                          }
                      }
                      Spacer(Modifier.height(10.dp))
                      Text(if(isAnimating) "" else "Tap to find a direction", style=MaterialTheme.typography.labelSmall, color=CompassColors.Silver400.copy(0.45f))
                      Spacer(Modifier.weight(1f))
                  }
              }
              if (showInput) {
                  ModalBottomSheet(onDismissRequest={showInput=false;angleInput=""}) {
                      Column(modifier=Modifier.fillMaxWidth().padding(horizontal=28.dp,vertical=8.dp), horizontalAlignment=Alignment.CenterHorizontally) {
                          Text("Enter a direction", style=MaterialTheme.typography.titleLarge, fontWeight=FontWeight.Bold)
                          Spacer(Modifier.height(6.dp))
                          Text("Type a compass angle", style=MaterialTheme.typography.bodyMedium, color=MaterialTheme.colorScheme.onSurfaceVariant)
                          Spacer(Modifier.height(28.dp))
                          OutlinedTextField(value=angleInput, onValueChange={angleInput=it.filter{c->c.isDigit()}.take(3)}, label={Text("Angle")}, placeholder={Text("0 – 360")}, suffix={Text("°")}, keyboardOptions=KeyboardOptions(keyboardType=KeyboardType.Number), singleLine=true, modifier=Modifier.fillMaxWidth(), textStyle=MaterialTheme.typography.displaySmall.copy(fontWeight=FontWeight.Bold, color=CompassColors.Blue300))
                          Spacer(Modifier.height(28.dp))
                          Button(onClick={val a=angleInput.toFloatOrNull(); if(a!=null&&a in 0f..360f){showInput=false;angleInput="";viewModel.tryUnlock(a)}}, enabled=angleInput.toFloatOrNull()?.let{it in 0f..360f}==true, modifier=Modifier.fillMaxWidth().height(56.dp), colors=ButtonDefaults.buttonColors(containerColor=CompassColors.Blue600)) { Text("Find Direction", style=MaterialTheme.typography.titleMedium) }
                          Spacer(Modifier.height(36.dp))
                      }
                  }
              }
          }
          private fun cardinal(h: Float) = when(h) { in 337.5f..360f,in 0f..22.5f->"North"; in 22.5f..67.5f->"North-East"; in 67.5f..112.5f->"East"; in 112.5f..157.5f->"South-East"; in 157.5f..202.5f->"South"; in 202.5f..247.5f->"South-West"; in 247.5f..292.5f->"West"; else->"North-West" }
          EOF

          # 10. UnlockSetupScreen with Google Drive step
          cat > app/src/main/java/com/compass/diary/ui/screens/unlock/UnlockSetupScreen.kt << 'EOF'
          package com.compass.diary.ui.screens.unlock
          import androidx.compose.animation.AnimatedContent
          import androidx.compose.foundation.background
          import androidx.compose.foundation.layout.*
          import androidx.compose.foundation.shape.CircleShape
          import androidx.compose.foundation.text.KeyboardOptions
          import androidx.compose.material.icons.Icons
          import androidx.compose.material.icons.filled.Cloud
          import androidx.compose.material3.*
          import androidx.compose.runtime.*
          import androidx.compose.ui.Alignment
          import androidx.compose.ui.Modifier
          import androidx.compose.ui.graphics.Brush
          import androidx.compose.ui.graphics.Color
          import androidx.compose.ui.text.font.FontWeight
          import androidx.compose.ui.text.input.KeyboardType
          import androidx.compose.ui.text.style.TextAlign
          import androidx.compose.ui.unit.dp
          import androidx.compose.ui.unit.sp
          import androidx.hilt.navigation.compose.hiltViewModel
          import com.compass.diary.ui.theme.CompassColors
          import com.compass.diary.viewmodel.SetupViewModel
          @Composable
          fun UnlockSetupScreen(onSetupComplete: () -> Unit, viewModel: SetupViewModel = hiltViewModel()) {
              val step by viewModel.step.collectAsState()
              val heading by viewModel.heading.collectAsState()
              var angleInput by remember { mutableStateOf("") }
              var inputError by remember { mutableStateOf(false) }
              Box(modifier=Modifier.fillMaxSize().background(Brush.verticalGradient(listOf(Color(0xFF060C1A),Color(0xFF0D2047))))) {
                  Column(modifier=Modifier.fillMaxSize().padding(24.dp), horizontalAlignment=Alignment.CenterHorizontally) {
                      Spacer(Modifier.height(60.dp))
                      Row(horizontalArrangement=Arrangement.spacedBy(8.dp)) {
                          repeat(4) { i -> Box(modifier=Modifier.size(if(i==step) 24.dp else 8.dp, 8.dp).background(if(i<=step) CompassColors.Blue400 else CompassColors.Silver700, CircleShape)) }
                      }
                      Spacer(Modifier.height(48.dp))
                      AnimatedContent(targetState=step, label="s") { s ->
                          when(s) {
                              0 -> Column(horizontalAlignment=Alignment.CenterHorizontally) {
                                  Text("🧭", fontSize=80.sp)
                                  Spacer(Modifier.height(24.dp))
                                  Text("Welcome to Compass", style=MaterialTheme.typography.headlineMedium, fontWeight=FontWeight.Bold, color=Color.White, textAlign=TextAlign.Center)
                                  Spacer(Modifier.height(12.dp))
                                  Text("Your private diary, hidden inside a compass", style=MaterialTheme.typography.bodyLarge, color=CompassColors.Silver400, textAlign=TextAlign.Center)
                                  Spacer(Modifier.height(32.dp))
                                  Card(colors=CardDefaults.cardColors(containerColor=Color(0xFF0D2047)), modifier=Modifier.fillMaxWidth()) {
                                      Column(Modifier.padding(20.dp)) {
                                          listOf("🔒  Hidden behind a real compass","✨  Unlimited daily diary pages","🤖  AI assistant for your notes","🎨  Rich text, drawings & voice").forEach {
                                              Text(it, style=MaterialTheme.typography.bodyMedium, color=CompassColors.Silver200, modifier=Modifier.padding(vertical=5.dp))
                                          }
                                      }
                                  }
                                  Spacer(Modifier.height(40.dp))
                                  Button(onClick={viewModel.goToStep(1)}, modifier=Modifier.fillMaxWidth().height(56.dp), colors=ButtonDefaults.buttonColors(containerColor=CompassColors.Blue600)) { Text("Get Started", style=MaterialTheme.typography.titleMedium) }
                              }
                              1 -> Column(horizontalAlignment=Alignment.CenterHorizontally) {
                                  Text("Set Your Secret Angle", style=MaterialTheme.typography.headlineMedium, fontWeight=FontWeight.Bold, color=Color.White, textAlign=TextAlign.Center)
                                  Spacer(Modifier.height(10.dp))
                                  Text("Choose any compass angle as your secret key.\nYou'll type it each time to open your diary.", style=MaterialTheme.typography.bodyLarge, color=CompassColors.Silver400, textAlign=TextAlign.Center)
                                  Spacer(Modifier.height(32.dp))
                                  Surface(color=Color(0xFF0D2047), shape=MaterialTheme.shapes.medium, modifier=Modifier.fillMaxWidth()) {
                                      Column(Modifier.padding(20.dp), horizontalAlignment=Alignment.CenterHorizontally) {
                                          Text("Current compass heading", style=MaterialTheme.typography.labelMedium, color=CompassColors.Silver400)
                                          Spacer(Modifier.height(6.dp))
                                          Text("${heading.toInt()}°", style=MaterialTheme.typography.displaySmall, fontWeight=FontWeight.Bold, color=CompassColors.Blue300)
                                          Spacer(Modifier.height(10.dp))
                                          OutlinedButton(onClick={angleInput=heading.toInt().toString()}, modifier=Modifier.fillMaxWidth()) { Text("Use this direction  (${heading.toInt()}°)") }
                                      }
                                  }
                                  Spacer(Modifier.height(16.dp))
                                  Text("— or type any angle —", style=MaterialTheme.typography.labelMedium, color=CompassColors.Silver400)
                                  Spacer(Modifier.height(12.dp))
                                  OutlinedTextField(value=angleInput, onValueChange={angleInput=it.filter{c->c.isDigit()}.take(3);inputError=false}, label={Text("Secret angle  (0 – 360)")}, placeholder={Text("e.g. 137")}, suffix={Text("°")}, isError=inputError, supportingText={if(inputError)Text("Enter 0 – 360")}, keyboardOptions=KeyboardOptions(keyboardType=KeyboardType.Number), singleLine=true, modifier=Modifier.fillMaxWidth(), textStyle=MaterialTheme.typography.headlineMedium.copy(fontWeight=FontWeight.Bold,color=CompassColors.Blue300))
                                  Spacer(Modifier.height(32.dp))
                                  Button(onClick={val a=angleInput.toFloatOrNull(); if(a!=null&&a in 0f..360f) viewModel.saveAngle1(a) else inputError=true}, enabled=angleInput.isNotBlank(), modifier=Modifier.fillMaxWidth().height(56.dp), colors=ButtonDefaults.buttonColors(containerColor=CompassColors.Blue600)) { Text("Save as My Secret Key", style=MaterialTheme.typography.titleMedium) }
                              }
                              2 -> Column(horizontalAlignment=Alignment.CenterHorizontally) {
                                  Icon(Icons.Default.Cloud, null, modifier=Modifier.size(80.dp), tint=CompassColors.Blue400)
                                  Spacer(Modifier.height(24.dp))
                                  Text("Connect Google Drive", style=MaterialTheme.typography.headlineMedium, fontWeight=FontWeight.Bold, color=Color.White, textAlign=TextAlign.Center)
                                  Spacer(Modifier.height(12.dp))
                                  Text("Sync your diary to Google Drive so you can\naccess it on any phone and never lose your notes.", style=MaterialTheme.typography.bodyLarge, color=CompassColors.Silver400, textAlign=TextAlign.Center)
                                  Spacer(Modifier.height(32.dp))
                                  Card(colors=CardDefaults.cardColors(containerColor=Color(0xFF0D2047)), modifier=Modifier.fillMaxWidth()) {
                                      Column(Modifier.padding(20.dp)) {
                                          listOf("☁️  Automatic cloud backup","📱  Open same diary on another phone","🔄  Real-time sync across devices","🔒  Your data stays private").forEach {
                                              Text(it, style=MaterialTheme.typography.bodyMedium, color=CompassColors.Silver200, modifier=Modifier.padding(vertical=5.dp))
                                          }
                                      }
                                  }
                                  Spacer(Modifier.height(32.dp))
                                  Text("Google Drive sync requires a one-time setup.\nYou can complete it now or later in Settings.", style=MaterialTheme.typography.bodySmall, color=CompassColors.Silver400, textAlign=TextAlign.Center)
                                  Spacer(Modifier.height(20.dp))
                                  Button(onClick={viewModel.goToStep(3)}, modifier=Modifier.fillMaxWidth().height(56.dp), colors=ButtonDefaults.buttonColors(containerColor=CompassColors.Blue600)) { Text("Set up Google Drive", style=MaterialTheme.typography.titleMedium) }
                                  Spacer(Modifier.height(12.dp))
                                  OutlinedButton(onClick={viewModel.goToStep(3)}, modifier=Modifier.fillMaxWidth().height(50.dp)) { Text("Skip for now") }
                              }
                              else -> Column(horizontalAlignment=Alignment.CenterHorizontally) {
                                  Text("✅", fontSize=80.sp)
                                  Spacer(Modifier.height(24.dp))
                                  Text("All set!", style=MaterialTheme.typography.headlineMedium, fontWeight=FontWeight.Bold, color=Color.White, textAlign=TextAlign.Center)
                                  Spacer(Modifier.height(12.dp))
