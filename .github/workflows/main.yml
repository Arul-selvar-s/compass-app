name: Build Compass APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fix launcher icon
        run: |
          cat > app/src/main/res/drawable/ic_launcher_foreground.xml << 'XMLEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="108dp"
              android:height="108dp"
              android:viewportWidth="108"
              android:viewportHeight="108">
              <path android:fillColor="#2563C8"
                  android:pathData="M54,10 A44,44 0 1,0 54,98 A44,44 0 1,0 54,10 Z"/>
              <path android:fillColor="#FFFFFF"
                  android:pathData="M54,22 L50,54 L54,52 L58,54 Z"/>
              <path android:fillColor="#EF4444"
                  android:pathData="M54,86 L50,54 L54,56 L58,54 Z"/>
              <path android:fillColor="#FFFFFF"
                  android:pathData="M50,50 A4,4 0 1,0 58,50 A4,4 0 1,0 50,50 Z"/>
          </vector>
          XMLEOF

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle 8.7
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'
          cache-disabled: true

      - name: Build APK
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Compass-App-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 90
