name: Build Compass APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Apply all fixes
        run: |

          # 1. Fix launcher icon
          cat > app/src/main/res/drawable/ic_launcher_foreground.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="108dp" android:height="108dp"
              android:viewportWidth="108" android:viewportHeight="108">
              <path android:fillColor="#2563C8" android:pathData="M54,10 A44,44 0 1,0 54,98 A44,44 0 1,0 54,10 Z"/>
              <path android:fillColor="#FFFFFF" android:pathData="M54,22 L50,54 L54,52 L58,54 Z"/>
              <path android:fillColor="#EF4444" android:pathData="M54,86 L50,54 L54,56 L58,54 Z"/>
              <path android:fillColor="#FFFFFF" android:pathData="M50,50 A4,4 0 1,0 58,50 A4,4 0 1,0 50,50 Z"/>
          </vector>
          EOF

          # 2. Fix themes.xml
          cat > app/src/main/res/values/themes.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="Theme.Compass" parent="android:Theme.Material.Light.NoActionBar">
                  <item name="android:windowBackground">@android:color/black</item>
              </style>
          </resources>
          EOF

          # 3. Remove installSplashScreen
          sed -i 's/installSplashScreen()/\/\/ installSplashScreen()/' \
            app/src/main/java/com/compass/diary/MainActivity.kt

          # 4. Disable SQLCipher
          sed -i 's/SQLiteDatabase.loadLibs(this)/\/\/ SQLiteDatabase.loadLibs(this)/' \
            app/src/main/java/com/compass/diary/CompassApplication.kt

          # 5. Fix AppDatabase
          cat > app/src/main/java/com/compass/diary/data/local/database/AppDatabase.kt << 'EOF'
          package com.compass.diary.data.local.database
          import androidx.room.Database
          import androidx.room.Room
          import androidx.room.RoomDatabase
          import android.content.Context
          import com.compass.diary.data.local.dao.*
          import com.compass.diary.data.local.entity.*
          @Database(entities=[DiaryEntryEntity::class,StarredItemEntity::class,ReminderEntity::class,VersionHistoryEntity::class,SharedPageEntity::class,DrawingEntity::class,VoiceNoteEntity::class],version=1,exportSchema=false)
          abstract class AppDatabase : RoomDatabase() {
              abstract fun diaryDao(): DiaryDao
              abstract fun starredDao(): StarredDao
              abstract fun reminderDao(): ReminderDao
              abstract fun versionHistoryDao(): VersionHistoryDao
              abstract fun drawingDao(): DrawingDao
              abstract fun voiceNoteDao(): VoiceNoteDao
              companion object {
                  fun create(context: Context, passphrase: ByteArray): AppDatabase {
                      return Room.databaseBuilder(context.applicationContext,AppDatabase::class.java,"compass_diary.db").fallbackToDestructiveMigration().build()
                  }
              }
          }
          EOF

          # 6. Fix Entities
          python3 - << 'PYEOF'
          import re
          path = "app/src/main/java/com/compass/diary/data/local/entity/Entities.kt"
          with open(path) as f:
              content = f.read()
          content = re.sub(r'[^\n]*thumbnail[^\n]*\n', '', content)
          with open(path, 'w') as f:
              f.write(content)
          print("Entities fixed")
          PYEOF

          # 7. NEW CompassViewModel - single angle unlock
          cat > app/src/main/java/com/compass/diary/viewmodel/CompassViewModel.kt << 'EOF'
          package com.compass.diary.viewmodel

          import androidx.lifecycle.ViewModel
          import androidx.lifecycle.viewModelScope
          import com.compass.diary.util.CompassSensorManager
          import com.compass.diary.util.PreferencesManager
          import dagger.hilt.android.lifecycle.HiltViewModel
          import kotlinx.coroutines.flow.*
          import kotlinx.coroutines.launch
          import javax.inject.Inject
          import kotlin.math.abs

          @HiltViewModel
          class CompassViewModel @Inject constructor(
              private val sensorManager: CompassSensorManager,
              private val prefs: PreferencesManager
          ) : ViewModel() {

              sealed class UnlockResult {
                  data class Correct(val angle: Float) : UnlockResult()
                  data class Wrong(val enteredAngle: Float) : UnlockResult()
              }

              val heading: StateFlow<Float> = sensorManager.headingFlow()
                  .stateIn(viewModelScope, SharingStarted.WhileSubscribed(5000), 0f)

              private val _unlockResult = MutableStateFlow<UnlockResult?>(null)
              val unlockResult: StateFlow<UnlockResult?> = _unlockResult

              private var savedAngle = -1f

              init {
                  viewModelScope.launch {
                      prefs.unlockAngles.collect { angles ->
                          if (angles != null) savedAngle = angles.first
                      }
                  }
              }

              fun tryUnlock(enteredAngle: Float) {
                  if (savedAngle < 0f) {
                      _unlockResult.value = UnlockResult.Wrong(enteredAngle)
                      return
                  }
                  val diff = abs(((enteredAngle - savedAngle + 540f) % 360f) - 180f)
                  _unlockResult.value = if (diff <= 10f) {
                      UnlockResult.Correct(enteredAngle)
                  } else {
                      UnlockResult.Wrong(enteredAngle)
                  }
              }

              fun resetResult() {
                  _unlockResult.value = null
              }
          }
          EOF

          # 8. NEW CompassScreen - tap angle display to unlock
          cat > app/src/main/java/com/compass/diary/ui/screens/compass/CompassScreen.kt << 'EOF'
          package com.compass.diary.ui.screens.compass

          import androidx.compose.animation.core.*
          import androidx.compose.foundation.Canvas
          import androidx.compose.foundation.background
          import androidx.compose.foundation.layout.*
          import androidx.compose.foundation.shape.RoundedCornerShape
          import androidx.compose.foundation.text.KeyboardOptions
          import androidx.compose.material3.*
          import androidx.compose.runtime.*
          import androidx.compose.ui.Alignment
          import androidx.compose.ui.Modifier
          import androidx.compose.ui.geometry.Offset
          import androidx.compose.ui.graphics.*
          import androidx.compose.ui.graphics.Path
          import androidx.compose.ui.graphics.drawscope.Stroke
          import androidx.compose.ui.graphics.drawscope.rotate
          import androidx.compose.ui.text.font.FontWeight
          import androidx.compose.ui.text.input.KeyboardType
          import androidx.compose.ui.unit.dp
          import androidx.compose.ui.unit.sp
          import androidx.hilt.navigation.compose.hiltViewModel
          import com.compass.diary.ui.theme.CompassColors
          import com.compass.diary.viewmodel.CompassViewModel
          import kotlinx.coroutines.launch
          import kotlin.math.cos
          import kotlin.math.sin

          @OptIn(ExperimentalMaterial3Api::class)
          @Composable
          fun CompassScreen(
              onUnlocked: () -> Unit,
              viewModel: CompassViewModel = hiltViewModel()
          ) {
              val heading by viewModel.heading.collectAsState()
              val unlockResult by viewModel.unlockResult.collectAsState()
              var showDialog by remember { mutableStateOf(false) }
              var angleInput by remember { mutableStateOf("") }
              var isAnimating by remember { mutableStateOf(false) }
              val needleAnim = remember { Animatable(0f) }
              val scope = rememberCoroutineScope()

              val needleRotation = if (isAnimating) needleAnim.value else -heading

              val needleColor = when {
                  unlockResult is CompassViewModel.UnlockResult.Correct -> Color(0xFF22C55E)
                  unlockResult is CompassViewModel.UnlockResult.Wrong && isAnimating -> Color(0xFFEF4444)
                  else -> Color(0xFFEF4444)
              }

              LaunchedEffect(unlockResult) {
                  val result = unlockResult ?: return@LaunchedEffect
                  isAnimating = true
                  needleAnim.snapTo(-heading)
                  needleAnim.animateTo(
                      needleAnim.value + 360f,
                      animationSpec = tween(900, easing = LinearEasing)
                  )
                  when (result) {
                      is CompassViewModel.UnlockResult.Correct -> {
                          needleAnim.animateTo(-result.angle,
                              animationSpec = spring(dampingRatio = Spring.DampingRatioMediumBouncy,
                                  stiffness = Spring.StiffnessMedium))
                          kotlinx.coroutines.delay(500)
                          isAnimating = false
                          onUnlocked()
                      }
                      is CompassViewModel.UnlockResult.Wrong -> {
                          needleAnim.animateTo(-result.enteredAngle,
                              animationSpec = spring(dampingRatio = Spring.DampingRatioHighBouncy,
                                  stiffness = Spring.StiffnessMedium))
                          kotlinx.coroutines.delay(1200)
                          isAnimating = false
                          viewModel.resetResult()
                      }
                  }
              }

              Box(
                  modifier = Modifier.fillMaxSize()
                      .background(Brush.radialGradient(
                          listOf(Color(0xFF0D1B3E), Color(0xFF060C1A)), radius = 1200f)),
                  contentAlignment = Alignment.Center
              ) {
                  Column(horizontalAlignment = Alignment.CenterHorizontally) {
                      Spacer(Modifier.weight(1f))

                      Text("COMPASS", style = MaterialTheme.typography.labelSmall,
                          color = CompassColors.Silver400.copy(alpha = 0.4f), letterSpacing = 6.sp)

                      Spacer(Modifier.height(32.dp))

                      // Compass dial
                      Box(contentAlignment = Alignment.Center, modifier = Modifier.size(280.dp)) {
                          Canvas(modifier = Modifier.fillMaxSize()) {
                              val c = Offset(size.width / 2, size.height / 2)
                              val r = size.width / 2
                              drawCircle(Color(0xFF1E3A6E), radius = r, style = Stroke(3.dp.toPx()))
                              drawCircle(Color(0xFF0D2047), radius = r - 4.dp.toPx())
                              drawCircle(Color(0xFF1A3060).copy(0.5f), radius = r * 0.85f, style = Stroke(1.dp.toPx()))
                              for (a in 0 until 360 step 10) {
                                  val major = a % 30 == 0
                                  val tl = if (major) r * 0.09f else r * 0.05f
                                  val rad = Math.toRadians(a.toDouble())
                                  drawLine(
                                      if (major) Color(0xFF4B82D0) else Color(0xFF2A4B7A),
                                      Offset(c.x + (r*0.88f)*sin(rad).toFloat(), c.y - (r*0.88f)*cos(rad).toFloat()),
                                      Offset(c.x + (r*0.88f-tl)*sin(rad).toFloat(), c.y - (r*0.88f-tl)*cos(rad).toFloat()),
                                      if (major) 2.dp.toPx() else 1.dp.toPx()
                                  )
                              }
                              rotate(needleRotation, pivot = c) {
                                  drawPath(Path().apply {
                                      moveTo(c.x, c.y + 6.dp.toPx()); lineTo(c.x - 6.dp.toPx(), c.y)
                                      lineTo(c.x, c.y - r * 0.72f); lineTo(c.x + 6.dp.toPx(), c.y); close()
                                  }, needleColor)
                                  drawPath(Path().apply {
                                      moveTo(c.x, c.y - 6.dp.toPx()); lineTo(c.x - 6.dp.toPx(), c.y)
                                      lineTo(c.x, c.y + r * 0.55f); lineTo(c.x + 6.dp.toPx(), c.y); close()
                                  }, Color(0xFFE5E7EB))
                              }
                              drawCircle(Color(0xFF2563C8), radius = 10.dp.toPx(), center = c)
                              drawCircle(Color(0xFF93C5FD), radius = 5.dp.toPx(), center = c)
                          }
                      }

                      Spacer(Modifier.height(32.dp))

                      // Tappable angle display
                      Surface(
                          onClick = { if (!isAnimating) showDialog = true },
                          color = Color(0xFF1A2E5A),
                          shape = RoundedCornerShape(16.dp)
                      ) {
                          Row(modifier = Modifier.padding(horizontal = 28.dp, vertical = 14.dp),
                              verticalAlignment = Alignment.CenterVertically,
                              horizontalArrangement = Arrangement.Center) {
                              Text("${heading.toInt()}°",
                                  style = MaterialTheme.typography.headlineSmall,
                                  fontWeight = FontWeight.Bold, color = CompassColors.Blue300)
                              Spacer(Modifier.width(10.dp))
                              Text(headingToCardinal(heading),
                                  style = MaterialTheme.typography.titleMedium,
                                  color = CompassColors.Silver400)
                              Spacer(Modifier.width(10.dp))
                              Text("🔓", fontSize = 18.sp)
                          }
                      }

                      Spacer(Modifier.height(10.dp))

                      Text(if (unlockResult is CompassViewModel.UnlockResult.Wrong && isAnimating)
                              "Incorrect — try again"
                          else "Tap the angle to unlock",
                          style = MaterialTheme.typography.labelSmall,
                          color = if (unlockResult is CompassViewModel.UnlockResult.Wrong && isAnimating)
                              Color(0xFFEF4444) else CompassColors.Silver400.copy(0.5f))

                      Spacer(Modifier.weight(1f))
                  }
              }

              if (showDialog) {
                  ModalBottomSheet(onDismissRequest = { showDialog = false; angleInput = "" }) {
                      Column(modifier = Modifier.fillMaxWidth().padding(horizontal = 24.dp, vertical = 8.dp),
                          horizontalAlignment = Alignment.CenterHorizontally) {
                          Text("Enter Compass Key", style = MaterialTheme.typography.titleLarge,
                              fontWeight = FontWeight.Bold)
                          Spacer(Modifier.height(6.dp))
                          Text("Type the angle you saved as your secret key",
                              style = MaterialTheme.typography.bodyMedium,
                              color = MaterialTheme.colorScheme.onSurfaceVariant)
                          Spacer(Modifier.height(24.dp))
                          OutlinedTextField(
                              value = angleInput,
                              onValueChange = { angleInput = it.filter { c -> c.isDigit() }.take(3) },
                              label = { Text("Angle  (0 – 360)") },
                              placeholder = { Text("e.g. 45") },
                              suffix = { Text("°") },
                              keyboardOptions = KeyboardOptions(keyboardType = KeyboardType.Number),
                              singleLine = true,
                              modifier = Modifier.fillMaxWidth(),
                              textStyle = MaterialTheme.typography.displaySmall.copy(
                                  fontWeight = FontWeight.Bold, color = CompassColors.Blue300)
                          )
                          Spacer(Modifier.height(16.dp))
                          Text("Or tap a cardinal direction:",
                              style = MaterialTheme.typography.labelMedium,
                              color = MaterialTheme.colorScheme.onSurfaceVariant,
                              modifier = Modifier.align(Alignment.Start))
                          Spacer(Modifier.height(10.dp))
                          val dirs = listOf("N" to 0,"NE" to 45,"E" to 90,"SE" to 135,
                              "S" to 180,"SW" to 225,"W" to 270,"NW" to 315)
                          Row(Modifier.fillMaxWidth(), horizontalArrangement = Arrangement.spacedBy(6.dp)) {
                              dirs.take(4).forEach { (l, a) ->
                                  OutlinedButton(onClick = { angleInput = a.toString() },
                                      modifier = Modifier.weight(1f),
                                      contentPadding = PaddingValues(4.dp)) {
                                      Text(l, style = MaterialTheme.typography.labelLarge)
                                  }
                              }
                          }
                          Spacer(Modifier.height(6.dp))
                          Row(Modifier.fillMaxWidth(), horizontalArrangement = Arrangement.spacedBy(6.dp)) {
                              dirs.drop(4).forEach { (l, a) ->
                                  OutlinedButton(onClick = { angleInput = a.toString() },
                                      modifier = Modifier.weight(1f),
                                      contentPadding = PaddingValues(4.dp)) {
                                      Text(l, style = MaterialTheme.typography.labelLarge)
                                  }
                              }
                          }
                          Spacer(Modifier.height(24.dp))
                          Button(
                              onClick = {
                                  val a = angleInput.toFloatOrNull()
                                  if (a != null && a in 0f..360f) {
                                      viewModel.tryUnlock(a)
                                      showDialog = false
                                      angleInput = ""
                                  }
                              },
                              enabled = angleInput.isNotBlank() && (angleInput.toFloatOrNull() ?: -1f) in 0f..360f,
                              modifier = Modifier.fillMaxWidth().height(56.dp),
                              colors = ButtonDefaults.buttonColors(containerColor = CompassColors.Blue600)
                          ) { Text("Submit", style = MaterialTheme.typography.titleMedium) }
                          Spacer(Modifier.height(32.dp))
                      }
                  }
              }
          }

          private fun headingToCardinal(h: Float) = when (h) {
              in 337.5f..360f, in 0f..22.5f -> "North"
              in 22.5f..67.5f -> "NE"
              in 67.5f..112.5f -> "East"
              in 112.5f..157.5f -> "SE"
              in 157.5f..202.5f -> "South"
              in 202.5f..247.5f -> "SW"
              in 247.5f..292.5f -> "West"
              else -> "NW"
          }
          EOF

          # 9. NEW UnlockSetupScreen - single angle entry
          cat > app/src/main/java/com/compass/diary/ui/screens/unlock/UnlockSetupScreen.kt << 'EOF'
          package com.compass.diary.ui.screens.unlock

          import androidx.compose.animation.AnimatedContent
          import androidx.compose.foundation.background
          import androidx.compose.foundation.layout.*
          import androidx.compose.foundation.shape.CircleShape
          import androidx.compose.foundation.text.KeyboardOptions
          import androidx.compose.material3.*
          import androidx.compose.runtime.*
          import androidx.compose.ui.Alignment
          import androidx.compose.ui.Modifier
          import androidx.compose.ui.graphics.Brush
          import androidx.compose.ui.graphics.Color
          import androidx.compose.ui.text.font.FontWeight
          import androidx.compose.ui.text.input.KeyboardType
          import androidx.compose.ui.text.style.TextAlign
          import androidx.compose.ui.unit.dp
          import androidx.compose.ui.unit.sp
          import androidx.hilt.navigation.compose.hiltViewModel
          import com.compass.diary.ui.theme.CompassColors
          import com.compass.diary.viewmodel.SetupViewModel

          @Composable
          fun UnlockSetupScreen(
              onSetupComplete: () -> Unit,
              viewModel: SetupViewModel = hiltViewModel()
          ) {
              val step by viewModel.step.collectAsState()
              val heading by viewModel.heading.collectAsState()
              var angleInput by remember { mutableStateOf("") }
              var inputError by remember { mutableStateOf(false) }

              Box(
                  modifier = Modifier.fillMaxSize().background(
                      Brush.verticalGradient(listOf(Color(0xFF060C1A), Color(0xFF0D2047))))
              ) {
                  Column(modifier = Modifier.fillMaxSize().padding(24.dp),
                      horizontalAlignment = Alignment.CenterHorizontally) {
                      Spacer(Modifier.height(60.dp))
                      StepDots(step = step, total = 3)
                      Spacer(Modifier.height(48.dp))

                      AnimatedContent(targetState = step, label = "step") { s ->
                          when (s) {
                              0 -> WelcomeStep(onNext = { viewModel.goToStep(1) })
                              1 -> SetKeyStep(
                                  liveHeading = heading,
                                  angleInput = angleInput,
                                  inputError = inputError,
                                  onAngleChange = { v ->
                                      angleInput = v.filter { it.isDigit() }.take(3)
                                      inputError = false
                                  },
                                  onUseLive = { angleInput = heading.toInt().toString() },
                                  onSave = {
                                      val a = angleInput.toFloatOrNull()
                                      if (a != null && a in 0f..360f) {
                                          viewModel.saveAngle1(a)
                                      } else {
                                          inputError = true
                                      }
                                  }
                              )
                              else -> DoneStep(onFinish = {
                                  viewModel.completeSetup()
                                  onSetupComplete()
                              })
                          }
                      }
                  }
              }
          }

          @Composable
          private fun StepDots(step: Int, total: Int) {
              Row(horizontalArrangement = Arrangement.spacedBy(8.dp)) {
                  repeat(total) { i ->
                      Box(modifier = Modifier.size(if (i == step) 24.dp else 8.dp, 8.dp)
                          .background(if (i <= step) CompassColors.Blue400 else CompassColors.Silver700, CircleShape))
                  }
              }
          }

          @Composable
          private fun WelcomeStep(onNext: () -> Unit) {
              Column(horizontalAlignment = Alignment.CenterHorizontally) {
                  Text("🧭", fontSize = 80.sp)
                  Spacer(Modifier.height(24.dp))
                  Text("Welcome to Compass", style = MaterialTheme.typography.headlineMedium,
                      fontWeight = FontWeight.Bold, color = Color.White, textAlign = TextAlign.Center)
                  Spacer(Modifier.height(12.dp))
                  Text("Your private diary hidden inside a compass app",
                      style = MaterialTheme.typography.bodyLarge, color = CompassColors.Silver400,
                      textAlign = TextAlign.Center)
                  Spacer(Modifier.height(32.dp))
                  Card(colors = CardDefaults.cardColors(containerColor = Color(0xFF0D2047)),
                      modifier = Modifier.fillMaxWidth()) {
                      Column(Modifier.padding(20.dp)) {
                          listOf("🔒  Hidden behind a real compass",
                              "✨  Unlimited daily diary pages",
                              "🤖  AI-powered search across your entries",
                              "🎨  Rich text, drawings & voice notes").forEach {
                              Text(it, style = MaterialTheme.typography.bodyMedium,
                                  color = CompassColors.Silver200, modifier = Modifier.padding(vertical = 5.dp))
                          }
                      }
                  }
                  Spacer(Modifier.height(40.dp))
                  Button(onClick = onNext, modifier = Modifier.fillMaxWidth().height(56.dp),
                      colors = ButtonDefaults.buttonColors(containerColor = CompassColors.Blue600)) {
                      Text("Get Started", style = MaterialTheme.typography.titleMedium)
                  }
              }
          }

          @Composable
          private fun SetKeyStep(
              liveHeading: Float,
              angleInput: String,
              inputError: Boolean,
              onAngleChange: (String) -> Unit,
              onUseLive: () -> Unit,
              onSave: () -> Unit
          ) {
              Column(horizontalAlignment = Alignment.CenterHorizontally) {
                  Text("Set Your Secret Key", style = MaterialTheme.typography.headlineMedium,
                      fontWeight = FontWeight.Bold, color = Color.White, textAlign = TextAlign.Center)
                  Spacer(Modifier.height(10.dp))
                  Text("Choose a compass angle as your secret.\nYou'll type this to unlock your diary.",
                      style = MaterialTheme.typography.bodyLarge, color = CompassColors.Silver400,
                      textAlign = TextAlign.Center)
                  Spacer(Modifier.height(32.dp))

                  // Live compass reading
                  Surface(color = Color(0xFF0D2047), shape = MaterialTheme.shapes.medium,
                      modifier = Modifier.fillMaxWidth()) {
                      Column(Modifier.padding(20.dp), horizontalAlignment = Alignment.CenterHorizontally) {
                          Text("Current compass heading", style = MaterialTheme.typography.labelMedium,
                              color = CompassColors.Silver400)
                          Spacer(Modifier.height(6.dp))
                          Text("${liveHeading.toInt()}°", style = MaterialTheme.typography.displaySmall,
                              fontWeight = FontWeight.Bold, color = CompassColors.Blue300)
                          Spacer(Modifier.height(10.dp))
                          OutlinedButton(onClick = onUseLive, modifier = Modifier.fillMaxWidth()) {
                              Text("Use this angle (${liveHeading.toInt()}°)")
                          }
                      }
                  }

                  Spacer(Modifier.height(20.dp))
                  Text("— or type any angle —", style = MaterialTheme.typography.labelMedium,
                      color = CompassColors.Silver400)
                  Spacer(Modifier.height(12.dp))

                  OutlinedTextField(
                      value = angleInput,
                      onValueChange = onAngleChange,
                      label = { Text("Secret angle (0 – 360)") },
                      placeholder = { Text("e.g. 137") },
                      suffix = { Text("°") },
                      isError = inputError,
                      supportingText = { if (inputError) Text("Enter a number between 0 and 360") },
                      keyboardOptions = KeyboardOptions(keyboardType = KeyboardType.Number),
                      singleLine = true,
                      modifier = Modifier.fillMaxWidth(),
                      textStyle = MaterialTheme.typography.headlineMedium.copy(
                          fontWeight = FontWeight.Bold, color = CompassColors.Blue300)
                  )

                  Spacer(Modifier.height(32.dp))
                  Button(onClick = onSave,
                      enabled = angleInput.isNotBlank(),
                      modifier = Modifier.fillMaxWidth().height(56.dp),
                      colors = ButtonDefaults.buttonColors(containerColor = CompassColors.Blue600)) {
                      Text("Save as My Secret Key", style = MaterialTheme.typography.titleMedium)
                  }
              }
          }

          @Composable
          private fun DoneStep(onFinish: () -> Unit) {
              Column(horizontalAlignment = Alignment.CenterHorizontally) {
                  Text("✅", fontSize = 80.sp)
                  Spacer(Modifier.height(24.dp))
                  Text("Secret Key Saved!", style = MaterialTheme.typography.headlineMedium,
                      fontWeight = FontWeight.Bold, color = Color.White, textAlign = TextAlign.Center)
                  Spacer(Modifier.height(12.dp))
                  Text("To unlock your diary:\n1. Open the app\n2. Tap the angle display\n3. Type your secret angle\n4. Tap Submit",
                      style = MaterialTheme.typography.bodyLarge, color = CompassColors.Silver400,
                      textAlign = TextAlign.Center)
                  Spacer(Modifier.height(48.dp))
                  Button(onClick = onFinish, modifier = Modifier.fillMaxWidth().height(56.dp),
                      colors = ButtonDefaults.buttonColors(containerColor = CompassColors.Blue600)) {
                      Text("Open My Diary", style = MaterialTheme.typography.titleMedium)
                  }
              }
          }
          EOF

          # 10. Update SetupViewModel - single angle, goToStep helper
          python3 - << 'PYEOF'
          path = "app/src/main/java/com/compass/diary/viewmodel/ViewModels.kt"
          with open(path) as f:
              content = f.read()
          # Make saveAngle1 go to step 2 (done) not step 2 (second direction)
          content = content.replace(
              "        _step.value = 2\n    }\n\n    fun saveAngle2",
              "        _step.value = 2\n    }\n\n    fun goToStep(s: Int) { _step.value = s }\n\n    fun saveAngle2"
          )
          if "fun goToStep" not in content:
              content = content.replace(
                  "    fun saveAngle1(",
                  "    fun goToStep(s: Int) { _step.value = s }\n\n    fun saveAngle1("
              )
          with open(path, 'w') as f:
              f.write(content)
          print("ViewModels updated")
          PYEOF

          echo "All fixes applied"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle 8.7
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'
          cache-disabled: true

      - name: Build APK
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Compass-App-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 90
