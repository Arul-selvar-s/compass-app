name: Build Compass APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fix all known runtime crash causes
        run: |

          # 1. Fix launcher icon
          cat > app/src/main/res/drawable/ic_launcher_foreground.xml << 'XMLEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="108dp" android:height="108dp"
              android:viewportWidth="108" android:viewportHeight="108">
              <path android:fillColor="#2563C8"
                  android:pathData="M54,10 A44,44 0 1,0 54,98 A44,44 0 1,0 54,10 Z"/>
              <path android:fillColor="#FFFFFF"
                  android:pathData="M54,22 L50,54 L54,52 L58,54 Z"/>
              <path android:fillColor="#EF4444"
                  android:pathData="M54,86 L50,54 L54,56 L58,54 Z"/>
              <path android:fillColor="#FFFFFF"
                  android:pathData="M50,50 A4,4 0 1,0 58,50 A4,4 0 1,0 50,50 Z"/>
          </vector>
          XMLEOF

          # 2. Fix themes.xml
          cat > app/src/main/res/values/themes.xml << 'XMLEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="Theme.Compass" parent="android:Theme.Material.Light.NoActionBar">
                  <item name="android:windowBackground">@android:color/black</item>
              </style>
          </resources>
          XMLEOF

          # 3. Remove installSplashScreen()
          sed -i 's/installSplashScreen()/\/\/ installSplashScreen()/' \
            app/src/main/java/com/compass/diary/MainActivity.kt

          # 4. Disable SQLCipher - use plain Room
          sed -i 's/SQLiteDatabase.loadLibs(this)/\/\/ SQLiteDatabase.loadLibs(this)/' \
            app/src/main/java/com/compass/diary/CompassApplication.kt

          cat > app/src/main/java/com/compass/diary/data/local/database/AppDatabase.kt << 'KTEOF'
          package com.compass.diary.data.local.database

          import androidx.room.Database
          import androidx.room.Room
          import androidx.room.RoomDatabase
          import android.content.Context
          import com.compass.diary.data.local.dao.*
          import com.compass.diary.data.local.entity.*

          @Database(
              entities = [
                  DiaryEntryEntity::class,
                  StarredItemEntity::class,
                  ReminderEntity::class,
                  VersionHistoryEntity::class,
                  SharedPageEntity::class,
                  DrawingEntity::class,
                  VoiceNoteEntity::class
              ],
              version = 1,
              exportSchema = false
          )
          abstract class AppDatabase : RoomDatabase() {
              abstract fun diaryDao(): DiaryDao
              abstract fun starredDao(): StarredDao
              abstract fun reminderDao(): ReminderDao
              abstract fun versionHistoryDao(): VersionHistoryDao
              abstract fun drawingDao(): DrawingDao
              abstract fun voiceNoteDao(): VoiceNoteDao

              companion object {
                  fun create(context: Context, passphrase: ByteArray): AppDatabase {
                      return Room.databaseBuilder(
                          context.applicationContext,
                          AppDatabase::class.java,
                          "compass_diary.db"
                      )
                      .fallbackToDestructiveMigration()
                      .build()
                  }
              }
          }
          KTEOF

          # 5. Fix Entities - remove thumbnail field
          python3 - << 'PYEOF'
          import re
          path = "app/src/main/java/com/compass/diary/data/local/entity/Entities.kt"
          with open(path) as f:
              content = f.read()
          content = re.sub(r'\s*@androidx\.room\.Ignore\s+val thumbnail[^\n]*\n', '\n', content)
          content = re.sub(r'\s*@Ignore\s+val thumbnail[^\n]*\n', '\n', content)
          content = re.sub(r'\s*val thumbnail: ByteArray\?[^\n]*\n', '\n', content)
          with open(path, 'w') as f:
              f.write(content)
          print("Entities fixed")
          PYEOF

          # 6. Fix WelcomeContent - add Get Started button
          python3 - << 'PYEOF'
          path = "app/src/main/java/com/compass/diary/ui/screens/unlock/UnlockSetupScreen.kt"
          with open(path) as f:
              content = f.read()
          content = content.replace(
              "0 -> WelcomeContent()",
              "0 -> WelcomeContent(onNext = viewModel::nextStep)"
          )
          content = content.replace(
              "private fun WelcomeContent() {\n    Column(horizontalAlignment = Alignment.CenterHorizontally) {",
              "private fun WelcomeContent(onNext: () -> Unit) {\n    Column(horizontalAlignment = Alignment.CenterHorizontally) {"
          )
          content = content.replace(
              "            }\n        }\n    }\n}\n\n@Composable\nprivate fun FeatureRow",
              "            }\n        }\n        Spacer(Modifier.height(24.dp))\n        Button(\n            onClick = onNext,\n            modifier = Modifier.fillMaxWidth().height(56.dp),\n            colors = ButtonDefaults.buttonColors(containerColor = CompassColors.Blue600)\n        ) { Text(\"Get Started\") }\n    }\n}\n\n@Composable\nprivate fun FeatureRow"
          )
          with open(path, 'w') as f:
              f.write(content)
          print("WelcomeContent button added")
          PYEOF

          echo "All fixes applied successfully"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle 8.7
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'
          cache-disabled: true

      - name: Build APK
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Compass-App-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 90
